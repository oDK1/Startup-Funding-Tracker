name: Daily Funding Scraper

on:
  schedule:
    # TEMPORARY: Testing cron after workflow re-enable (normally runs at 14:00 UTC)
    - cron: '20 19 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  SCRAPE_URL: https://startup-funding-tracker.vercel.app/api/scrape
  DIGEST_URL: https://startup-funding-tracker.vercel.app/api/send-digest

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger scraper
        run: |
          echo "Calling: $SCRAPE_URL"
          response=$(curl -s -w "\n%{http_code}" -X GET "$SCRAPE_URL" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 300)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Scraper completed successfully"
          else
            echo "Scraper failed with status $http_code"
            exit 1
          fi

